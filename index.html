<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Unity WebGL Minimal</title>
    <style>
        /* 画面いっぱいに表示するためのスタイル */
        body { margin: 0; overflow: hidden; }
        #unity-container { width: 100vw; height: 100vh; }
        #unity-canvas { width: 100%; height: 100%; background: #231f20; }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script src="UnityBuild/Build/PBH_Unity6.loader.js"></script>
    
    <script>
        const canvas = document.querySelector("#unity-canvas");
        
        // 設定オブジェクト内の各パスを UnityBuild 経由に変更
        const config = {
            dataUrl: "UnityBuild/Build/PBH_Unity6.data",
            frameworkUrl: "UnityBuild/Build/PBH_Unity6.framework.js",
            codeUrl: "UnityBuild/Build/PBH_Unity6.wasm",
            streamingAssetsUrl: "UnityBuild/StreamingAssets",
            companyName: "DefaultCompany",
            productName: "MyProject",
            productVersion: "0.1",
        };

        // Unityインスタンスの生成
        createUnityInstance(canvas, config, (progress) => {
            console.log("Loading... " + (100 * progress) + "%");
        }).then((unityInstance) => {
            console.log("Unity Loaded!");
        }).catch((message) => {
            alert(message);
        });
    </script>
</body>
</html>
