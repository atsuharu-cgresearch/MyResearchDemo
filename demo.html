<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Demo</title>
    <style>
        body {
            margin: 0;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #unity-canvas {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #231f20;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="unity-canvas"></canvas>

    <script src="UnityBuild/Build/PBH_Unity6_Opt2_Build.loader.js"></script>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        
        // 【注意】ここの config の中身は、Unityが出力した元の main.js 
        // （または古い index.html）に書かれていたものをそのままコピーしてください。
        var config = {
            dataUrl: "UnityBuild/Build/PBH_Unity6_Opt2_Build.data",
            frameworkUrl: "UnityBuild/Build/PBH_Unity6_Opt2_Build.framework.js",
            codeUrl: "UnityBuild/Build/PBH_Unity6_Opt2_Build.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "PositionBasedHighlight",
            productVersion: "1.0",
        };

        // ローディングバーなどの処理を全て消し、ただ起動するだけ
        createUnityInstance(canvas, config);
    </script>
</body>
</html>
